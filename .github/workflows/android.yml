name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:       # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & build web
        run: |
          npm install
          npm run build
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # Signed release build (requires GitHub Secrets to be configured)
      # -----------------------------------------------------------------------
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aquaalarm.jks

      - name: Build signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/aquaalarm.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: aquaalarm-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # -----------------------------------------------------------------------
      # Unsigned debug build (always runs — useful before keystore is set up)
      # -----------------------------------------------------------------------
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aquaalarm-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
